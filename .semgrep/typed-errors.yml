rules:
  - id: browsey.commands.no-from-external-message-to-string
    message: Avoid string round-trip `from_external_message(...to_string())` in backend source modules.
    severity: WARNING
    languages:
      - rust
    paths:
      include:
        - /src/**/*.rs
      exclude:
        - /src/**/tests.rs
        - /src/**/tests/**/*.rs
        - /src/**/*test*.rs
    pattern: $ERR::from_external_message($X.to_string())

  - id: browsey.commands.no-map-err-to-string-seam
    message: Avoid stringifying typed errors in `map_err` seams for backend source modules.
    severity: WARNING
    languages:
      - rust
    paths:
      include:
        - /src/**/*.rs
      exclude:
        - /src/**/tests.rs
        - /src/**/tests/**/*.rs
        - /src/**/*test*.rs
    pattern-either:
      - pattern: $RES.map_err(|$E| $ERR::from_external_message($E.to_string()))
      - pattern: $RES.map_err(|$E| $ERR::new($CODE, $E.to_string()))

  - id: browsey.commands.no-from-impl-to-string
    message: Avoid introducing `impl From<...> for String` in backend source modules.
    severity: WARNING
    languages:
      - rust
    paths:
      include:
        - /src/**/*.rs
      exclude:
        - /src/**/tests.rs
        - /src/**/tests/**/*.rs
        - /src/**/*test*.rs
    pattern: |
      impl From<$T> for String {
        ...
      }
